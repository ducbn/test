services:
  postgres_db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - todo_network
  redis_cache:
    image: redis:7-alpine
    networks:
      - todo_network
  backend:
    build:
      context: ./backend
    depends_on:
      - postgres_db
      - redis_cache
    networks:
      - todo_network
  frontend:
    build:
      context: ./frontend
    networks:
      - todo_network
  proxy:
    image: nginx:stable-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - todo_network

networks:
  todo_network:
    driver: bridge

volumes:
  postgres_data: